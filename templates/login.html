<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In — BCAT Command Center</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #05070d;
            color: #f3f4f6;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #0d1219;
            border: 1px solid #1e293b;
            border-radius: 14px;
            padding: 40px 36px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .brand-mark {
            width: 40px; height: 40px;
            background: #0ea5e9;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 800; color: #fff;
            flex-shrink: 0;
        }
        .brand-text { line-height: 1.2; }
        .brand-name { font-size: 15px; font-weight: 700; color: #e2e8f0; }
        .brand-sub {
            font-size: 11px; color: #475569; letter-spacing: 0.06em;
            text-transform: uppercase; font-weight: 600;
        }

        h1 { font-size: 20px; font-weight: 700; color: #e2e8f0; margin-bottom: 6px; }
        .subtitle { font-size: 13px; color: #64748b; margin-bottom: 28px; }

        .field { margin-bottom: 16px; }
        label {
            display: block;
            font-size: 12px; font-weight: 600; color: #94a3b8;
            margin-bottom: 6px; letter-spacing: 0.02em;
        }
        input[type="email"],
        input[type="password"] {
            width: 100%;
            background: #060d14;
            border: 1px solid #1e293b;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            padding: 10px 13px;
            outline: none;
            transition: border-color 0.15s;
            font-family: inherit;
        }
        input[type="email"]:focus,
        input[type="password"]:focus { border-color: #0ea5e9; }
        input::placeholder { color: #334155; }

        .error-banner {
            background: #1a0c0c;
            border: 1px solid #7f1d1d;
            border-radius: 7px;
            padding: 10px 13px;
            font-size: 13px; color: #fca5a5;
            margin-bottom: 18px;
            display: flex; align-items: center; gap: 8px;
        }
        .error-banner::before { content: '⚠'; flex-shrink: 0; }

        button[type="submit"] {
            width: 100%;
            background: #0ea5e9;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 11px;
            font-size: 14px; font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
            font-family: inherit;
            margin-top: 6px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        button[type="submit"]:hover { background: #0284c7; }
        button[type="submit"]:active { background: #0369a1; }

        .footer {
            margin-top: 32px;
            font-size: 11px; color: #334155; text-align: center;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="brand">
        <div class="brand-mark">A</div>
        <div class="brand-text">
            <div class="brand-name">Aiden</div>
            <div class="brand-sub">BCAT Command Center</div>
        </div>
    </div>

    <h1>Sign in</h1>
    <p class="subtitle">Enter your credentials to access the command center.</p>

    <div id="error-banner" class="error-banner" style="display:none"></div>

    <form method="POST" action="/login" autocomplete="on">
        <input type="hidden" name="next" id="next-input" value="">

        <div class="field">
            <label for="email">Email</label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="you@bcatcorp.com"
                autocomplete="username"
                autofocus
                required
            >
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••••"
                autocomplete="current-password"
                required
            >
        </div>

        <button type="submit">Initialize Uplink</button>
    </form>
</div>

<div class="footer">Aiden — BCAT Command Center &nbsp;·&nbsp; Private access only</div>

<script>
    // Read error/email/next from query string (set by POST /login on failure)
    const params = new URLSearchParams(window.location.search);
    const err = params.get('error');
    const email = params.get('email');
    const next = params.get('next');

    if (err) {
        const banner = document.getElementById('error-banner');
        const messages = {
            'invalid_credentials': 'Invalid email or password.',
            'missing_fields': 'Email and password are required.',
            'server_error': 'Server configuration error. Contact admin.',
        };
        banner.textContent = messages[err] || 'Login failed. Please try again.';
        banner.style.display = 'flex';
    }
    if (email) {
        document.getElementById('email').value = decodeURIComponent(email);
    }
    if (next) {
        document.getElementById('next-input').value = decodeURIComponent(next);
    }
</script>

</body>
</html>
